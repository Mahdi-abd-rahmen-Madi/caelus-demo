<!DOCTYPE html>
<html>

<head>
    <title>Enedis V1 Proxy Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
        }

        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Enedis V1 Proxy Test</h1>

    <div class="test-section">
        <h2>Test Proxy Endpoints</h2>
        <button onclick="testPosteElectrique()">Test Poste Electrique</button>
        <button onclick="testHTALines()">Test HTA Lines</button>
        <button onclick="testBTLines()">Test BT Lines</button>
        <button onclick="testHTALinesUnderground()">Test HTA Lines (Underground)</button>
        <button onclick="testBTLinesUnderground()">Test BT Lines (Underground)</button>
        <button onclick="testStatus()">Test Status</button>
        <button onclick="clearCache()">Clear Cache</button>

        <div id="result" class="result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/geodata/enedis-v1';

        function showResult(data, isSuccess = true) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${isSuccess ? 'success' : 'error'}`;
            resultDiv.innerHTML = `
                <h3>${isSuccess ? 'Success' : 'Error'}</h3>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
        }

        async function testPosteElectrique() {
            try {
                const response = await fetch(`${API_BASE}/proxy/poste-electrique/?bbox=2.2,48.8,2.4,49.0&limit=5`);
                const data = await response.json();
                showResult(data, response.ok);
            } catch (error) {
                showResult({ error: error.message }, false);
            }
        }

        async function testHTALines() {
            try {
                const response = await fetch(`${API_BASE}/proxy/reseau-hta/?bbox=2.2,48.8,2.4,49.0&limit=5`);
                const data = await response.json();
                showResult(data, response.ok);
            } catch (error) {
                showResult({ error: error.message }, false);
            }
        }

        async function testBTLines() {
            try {
                const response = await fetch(`${API_BASE}/proxy/reseau-bt/?bbox=2.2,48.8,2.4,49.0&limit=5`);
                const data = await response.json();
                showResult(data, response.ok);
            } catch (error) {
                showResult({ error: error.message }, false);
            }
        }

        async function testHTALinesUnderground() {
            try {
                const response = await fetch(`${API_BASE}/proxy/reseau-souterrain-hta/?bbox=2.2,48.8,2.4,49.0&limit=5`);
                const data = await response.json();
                showResult(data, response.ok);
            } catch (error) {
                showResult({ error: error.message }, false);
            }
        }

        async function testBTLinesUnderground() {
            try {
                const response = await fetch(`${API_BASE}/proxy/reseau-souterrain-bt/?bbox=2.2,48.8,2.4,49.0&limit=5`);
                const data = await response.json();
                showResult(data, response.ok);
            } catch (error) {
                showResult({ error: error.message }, false);
            }
        }

        async function testStatus() {
            try {
                const response = await fetch(`${API_BASE}/status/`);
                const data = await response.json();
                showResult(data, response.ok);
            } catch (error) {
                showResult({ error: error.message }, false);
            }
        }

        async function clearCache() {
            try {
                const response = await fetch(`${API_BASE}/clear-cache/`, { method: 'POST' });
                const data = await response.json();
                showResult(data, response.ok);
            } catch (error) {
                showResult({ error: error.message }, false);
            }
        }
    </script>
</body>

</html>
